<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal — Zenbliss Schools</title>
    <style>
        :root {
            --primary-blue: #1A365D;
            --accent-red: #9B2C2C;
            --background-white: #FFFFFF;
            --light-gray: #EDF2F7;
            --border-color: #E2E8F0;
            --text-dark: #2D3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #F7FAFC;
            color: var(--text-dark);
            line-height: 1.5;
            padding-bottom: 50px;
        }

        .portal-header {
            background-color: var(--primary-blue);
            color: var(--background-white);
            padding: 15px 0;
            border-bottom: 4px solid var(--accent-red);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-branding {
            display: flex;
            align-items: center;
            gap: 15px;
        }
