<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let globalActiveStudentData = null;

    window.onload = function () {
        validateAndLoadStudentProfile();
    };

    function handleLogout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    async function validateAndLoadStudentProfile() {
        try {
            const studentId = localStorage.getItem('current_student_id');
            if (!studentId) {
                alert("Session terminated. Please login again.");
                window.location.href = "index.html";
                return;
            }

            const { data: student, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('id', studentId)
                .single();

            if (error || !student) {
                console.error("Supabase load error:", error);
                alert("Error calling student terminal data packets.");
                window.location.href = "index.html";
                return;
            }

            globalActiveStudentData = student;

            // Safely extract short ID
            const rawId = student.id || "";
            const displayId = rawId.length > 8 ? rawId.substring(0, 8).toUpperCase() : "N/A";

            document.getElementById('portal-welcome-title').innerText = "Welcome, " + (student.admission_number || "Student");
            document.getElementById('portal-meta-id').innerText = displayId;

            const joinedClasses = student.assigned_classes || [];
            document.getElementById('portal-meta-class').innerText = joinedClasses.length > 0 ? joinedClasses.join(', ') : "Unassigned";
        } catch (err) {
            console.error("Crash during profile loading:", err);
        }
    }

    function determineGradeLetter(total) {
        const num = Number(total) || 0;
        if (num >= 75) return { letter: "A", color: "green" };
        if (num >= 65) return { letter: "B", color: "blue" };
        if (num >= 50) return { letter: "C", color: "orange" };
        if (num >= 40) return { letter: "D", color: "purple" };
        return { letter: "F", color: "red" };
    }

    function revealLiveReportCard() {
        try {
            if (!globalActiveStudentData) {
                alert("Account details not fully initialized. Please refresh the page.");
                return;
            }

            const student = globalActiveStudentData;
            const chosenTerm = document.getElementById('selected-term-archive').value;

            // Fallback check to catch missing or unreleased configurations safely
            if (student.math_score === null || student.math_score === undefined || student.math_score === -1) {
                alert(`⚠️ Notice: The results for ${chosenTerm} have not been officially compiled or released by the school administration yet. Please check back later.`);
                return;
            }

            const rawId = student.id || "";
            const displayId = rawId.length > 8 ? rawId.substring(0, 8).toUpperCase() : "N/A";

            document.getElementById('display-target-term').innerText = chosenTerm + " Ledger (2026/2027 Session)";
            document.getElementById('card-student-name').innerText = student.admission_number || "Registered Academic Student";
            document.getElementById('card-admission-no').innerText = displayId;

            const classes = student.assigned_classes || [];
            document.getElementById('card-class-level').innerText = classes.length > 0 ? classes.join(', ') : "Not Set";

            document.getElementById('card-display-attendance').innerText = `${student.days_present || 0} / 90 Days Present`;

            const targetClassStr = classes.length > 0 ? String(classes[0]) : "";
            const deptStr = student.department ? String(student.department).trim() : "None";

            let lockBio = false;
            if (targetClassStr.startsWith("SS") && (deptStr === "Commercial" || deptStr === "Humanity")) {
                lockBio = true;
            }

            // Convert fields strictly to usable metrics safely
            const mathScore = Number(student.math_score) || 0;
            const engScore = Number(student.english_score) || 0;
            const bioScore = Number(student.biology_score) || 0;

            const tbody = document.getElementById('dynamic-grades-body');
            tbody.innerHTML = "";

            let mGrade = determineGradeLetter(mathScore);
            tbody.innerHTML += `<tr>
                    <td style="text-align: left; font-weight: 600;">Mathematics</td>
                    <td>Data Synced</td>
                    <td>${mathScore}</td>
                    <td style="font-weight: bold;">${mathScore}</td>
                    <td style="font-weight: bold; color: ${mGrade.color};">${mGrade.letter}</td>
                </tr>`;

            let eGrade = determineGradeLetter(engScore);
            tbody.innerHTML += `<tr>
                    <td style="text-align: left; font-weight: 600;">English Language</td>
                    <td>Data Synced</td>
                    <td>${engScore}</td>
                    <td style="font-weight: bold;">${engScore}</td>
                    <td style="font-weight: bold; color: ${eGrade.color};">${eGrade.letter}</td>
                </tr>`;

            let dynamicTotalScore = mathScore + engScore;
            let denominatorValue = 200;

            if (lockBio) {
                tbody.innerHTML += `<tr>
                        <td style="text-align: left; font-weight: 600; color:#a0aec0;">Biology</td>
                        <td colspan="4" style="color:#a0aec0; font-style:italic;">Not Offered (Exempted via Department Path)</td>
                    </tr>`;
            } else {
                let bGrade = determineGradeLetter(bioScore);
                dynamicTotalScore += bioScore;
                denominatorValue = 300;
                tbody.innerHTML += `<tr>
                        <td style="text-align: left; font-weight: 600;">Biology</td>
                        <td>Data Synced</td>
                        <td>${bioScore}</td>
                        <td style="font-weight: bold;">${bioScore}</td>
                        <td style="font-weight: bold; color: ${bGrade.color};">${bGrade.letter}</td>
                    </tr>`;
            }

            const exactAverage = ((dynamicTotalScore / denominatorValue) * 100);
            document.getElementById('display-target-avg').innerText = exactAverage.toFixed(1) + "%";

            const statusBox = document.getElementById('display-outcome-status');
            if (exactAverage >= 40) {
                statusBox.innerText = "PASS";
                statusBox.style.color = "green";
            } else {
                statusBox.innerText = "FAIL / RETAKE";
                statusBox.style.color = "var(--accent-red)";
            }

            document.getElementById('rate-punctual').innerText = (student.punctuality_rating || "5") + " / 5";
            document.getElementById('rate-leadership').innerText = (student.leadership_rating || "5") + " / 5";
            document.getElementById('rate-maturity').innerText = (student.maturity_rating || "5") + " / 5";
            document.getElementById('rate-cleanliness').innerText = (student.cleanliness_rating || "5") + " / 5";
            document.getElementById('rate-handwriting').innerText = (student.handwriting_rating || "5") + " / 5";
            document.getElementById('rate-hardwork').innerText = (student.hardwork_rating || "5") + " / 5";
            document.getElementById('rate-sport').innerText = (student.sport_rating || "5") + " / 5";
            document.getElementById('rate-pop').innerText = student.class_total_students || "N/A";

            document.getElementById('card-display-teacher-remark').innerText = student.teacher_comment ? `"${student.teacher_comment}"` : `"No remark provided yet."`;

            const principalCommentElement = document.getElementById('card-display-principal-remark');
            if (exactAverage >= 75) {
                principalCommentElement.innerText = `"An outstanding performance. This exceptional standard reflects brilliant focus and ability. Well done."`;
            } else if (exactAverage >= 50) {
                principalCommentElement.innerText = `"Good effort. Promising results, with more focus you can achieve greater scores across your structural criteria paths."`;
            } else {
                principalCommentElement.innerText = `"Performance is below average. Intense academic revision is recommended to establish stable baseline tracks."`;
            }

            document.getElementById('result-gate').classList.add('hidden');
            document.getElementById('report-card-view').classList.remove('hidden');
        } catch (err) {
            console.error("Crash during report generation:", err);
            alert("An error occurred while building the report card data arrays. Please check the developer console.");
        }
    }

    function returnToGate() {
        document.getElementById('report-card-view').classList.add('hidden');
        document.getElementById('result-gate').classList.remove('hidden');
    }
</script>
