<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenbliss School - Portal Registration</title>
    <style>
        :root {
            --primary-color: #4a6cf7;
            --background-color: #f4f7fe;
            --text-color: #2b3674;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .register-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 100px;
            height: auto;
            object-fit: contain;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #707eae;
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* Password Wrapper for Toggle Icon */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 45px;
            /* Leaves space for the toggle icon */
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            cursor: pointer;
            color: #707eae;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .hidden {
            display: none !important;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e5f2;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--text-color);
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .register-btn:hover {
            background-color: #3751d7;
        }

        .login-redirect {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #707eae;
        }

        .login-redirect a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="logo-container">
            <img src="logo.jpg" alt="Zenbliss School Logo" onerror="this.style.display='none';">
        </div>

        <h2>Student Registration</h2>
        <p class="subtitle">Create an account to submit your details for approval.</p>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="e.g., John Doe">
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" required placeholder="e.g., 08012345678">
            </div>

            <div class="form-group">
                <label for="classSelect">Class</label>
                <select id="classSelect" required>
                    <option value="">Select Class</option>
                    <option value="JSS 1">JSS 1</option>
                    <option value="JSS 2">JSS 2</option>
                    <option value="JSS 3">JSS 3</option>
                    <option value="SS 1">SS 1</option>
                    <option value="SS 2">SS 2</option>
                    <option value="SS 3">SS 3</option>
                </select>
            </div>

            <div class="form-group hidden" id="departmentGroup">
                <label for="departmentSelect">Department</label>
                <select id="departmentSelect">
                    <option value="">Select Department</option>
                    <option value="Science">Science</option>
                    <option value="Humanity">Humanity</option>
                    <option value="Commercial">Commercial</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <span class="toggle-password" id="togglePasswordBtn">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="register-btn">Submit Request</button>
        </form>

        <div class="login-redirect">
            Can't log in or already have an account? <br>
            <a href="index.html">Return to Portal Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Synchronized Supabase instance references
        const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const classSelect = document.getElementById('classSelect');
        const departmentGroup = document.getElementById('departmentGroup');
        const departmentSelect = document.getElementById('departmentSelect');

        // Toggle Password Visibility Logic
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePasswordBtn.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';

            if (isPassword) {
                passwordInput.setAttribute('type', 'text');
                // Change icon to 'Eye Off'
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                passwordInput.setAttribute('type', 'password');
                // Change icon back to regular 'Eye'
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });

        classSelect.addEventListener('change', function () {
            const selectedClass = this.value;
            if (selectedClass.startsWith('SS')) {
                departmentGroup.classList.remove('hidden');
                departmentSelect.setAttribute('required', 'required');
            } else {
                departmentGroup.classList.add('hidden');
                departmentSelect.removeAttribute('required');
                departmentSelect.value = "";
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const selectedClass = document.getElementById('classSelect').value;
            const department = departmentSelect.value || "None";
            const userPassword = passwordInput.value;

            try {
                // Check if account already exists with same name (and department if senior)
                let checkQuery = supabaseClient
                    .from('users')
                    .select('id')
                    .ilike('admission_number', fullName);

                if (department && department !== "None") {
                    checkQuery = checkQuery.eq('department', department);
                }

                const { data: existingUsers, error: checkError } = await checkQuery;

                if (checkError) {
                    console.error("Error checking duplicates:", checkError);
                    alert("An error occurred while verifying account information.");
                    return;
                }

                if (existingUsers && existingUsers.length > 0) {
                    alert("An account with the same information is already in existence.");
                    return;
                }

                // Direct cloud pipeline transmission 
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert([
                        {
                            admission_number: fullName,
                            password: userPassword,
                            role: 'student',
                            is_approved: false,
                            assigned_classes: [selectedClass],
                            department: department,
                            phone: phoneNumber
                        }
                    ]);

                if (error) {
                    alert("Registration Submission Failed: " + error.message);
                    return;
                }

                alert(`Application for ${fullName} submitted successfully!\nPlease wait for the administrator to approve your access token terminal profile before logging in.`);

                // Resetting view layers cleanly
                this.reset();
                passwordInput.setAttribute('type', 'password');
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
                departmentGroup.classList.add('hidden');
                departmentSelect.removeAttribute('required');

            } catch (err) {
                console.error("Registration error:", err);
                alert("Registration failed: " + err.message);
            }
        });
    </script>

</body>

</html>
