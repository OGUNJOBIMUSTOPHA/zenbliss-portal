<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenbliss School - Portal Registration</title>
    <style>
        :root {
            --primary-color: #4a6cf7;
            --background-color: #f4f7fe;
            --text-color: #2b3674;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .register-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 100px;
            height: auto;
            object-fit: contain;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #707eae;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e5f2;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--text-color);
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .register-btn:hover {
            background-color: #3751d7;
        }

        .login-redirect {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #707eae;
        }

        .login-redirect a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-redirect a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="logo-container">
            <img src="logo.jpg" alt="Zenbliss School Logo" onerror="this.style.display='none';">
        </div>

        <h2>Student Registration</h2>
        <p class="subtitle">Create an account to submit your details for approval.</p>

        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="e.g., John Doe">
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="tel" id="phoneNumber" required placeholder="e.g., 08012345678">
            </div>

            <div class="form-group">
                <label for="classSelect">Class</label>
                <select id="classSelect" required>
                    <option value="">Select Class</option>
                    <option value="JSS 1">JSS 1</option>
                    <option value="JSS 2">JSS 2</option>
                    <option value="JSS 3">JSS 3</option>
                    <option value="SS 1">SS 1</option>
                    <option value="SS 2">SS 2</option>
                    <option value="SS 3">SS 3</option>
                </select>
            </div>

            <div class="form-group hidden" id="departmentGroup">
                <label for="departmentSelect">Department</label>
                <select id="departmentSelect">
                    <option value="">Select Department</option>
                    <option value="Science and technology">Science and technology</option>
                    <option value="Science">Science</option>
                    <option value="Humanity">Humanity</option>
                    <option value="Commercial">Commercial</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="register-btn">Submit Request</button>
        </form>

        <div class="login-redirect">
            Can't log in or already have an account? <br>
            <a href="index.html">Return to Portal Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Synchronized Supabase instance references
        const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const classSelect = document.getElementById('classSelect');
        const departmentGroup = document.getElementById('departmentGroup');
        const departmentSelect = document.getElementById('departmentSelect');

        classSelect.addEventListener('change', function () {
            const selectedClass = this.value;
            if (selectedClass.startsWith('SS')) {
                departmentGroup.classList.remove('hidden');
                departmentSelect.setAttribute('required', 'required');
            } else {
                departmentGroup.classList.add('hidden');
                departmentSelect.removeAttribute('required');
                departmentSelect.value = "";
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const selectedClass = document.getElementById('classSelect').value;
            const department = departmentSelect.value || "None";
            const userPassword = document.getElementById('password').value;

            // Direct cloud pipeline transmission 
            const { data, error } = await supabaseClient
                .from('users')
                .insert([
                    {
                        admission_number: fullName, // Saves Name into layout field token slot directly
                        password: userPassword,
                        role: 'student',
                        is_approved: false, // Ensures row appears on Admin pending screen
                        assigned_classes: [selectedClass], // Matched array allocation 
                        department: department,
                        phone: phoneNumber // Land tracking data asset field row mapping safely
                    }
                ]);

            if (error) {
                alert("Registration Submission Failed: " + error.message);
                return;
            }

            alert(`Application for ${fullName} submitted successfully!\nPlease wait for the administrator to approve your access token terminal profile before logging in.`);

            // Resetting view layers cleanly
            this.reset();
            departmentGroup.classList.add('hidden');
            departmentSelect.removeAttribute('required');
        });
    </script>

</body>

</html>
