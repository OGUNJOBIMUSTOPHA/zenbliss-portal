<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zenbliss Portal Terminal</title>
    <style>
        :root {
            --primary-blue: #1A365D;
            --accent-red: #9B2C2C;
            --background-white: #FFFFFF;
            --text-dark: #2D3748;
            --border-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #F7FAFC;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Branding Header with Logo Placement */
        .portal-header {
            background-color: var(--primary-blue);
            color: var(--background-white);
            padding: 20px 0;
            border-bottom: 4px solid var(--accent-red);
            text-align: center;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .school-logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #718096;
            font-weight: bold;
            border: 2px solid var(--accent-red);
        }

        .school-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* Main Login Area */
        .main-hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 850px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .login-grid {
                grid-template-columns: 1fr;
            }
        }

        .login-card {
            background: var(--background-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .login-card h3 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4A5568;
        }

        .form-group input {
            padding: 10px 14px;
            border: 1px solid #CBD5E0;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #2A4365;
        }

        .teacher-btn {
            background-color: var(--accent-red);
        }

        .teacher-btn:hover {
            background-color: #742A2A;
        }

        .footer-notice {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #A0AEC0;
            border-top: 1px solid var(--border-color);
            background: #ffffff;
        }
    </style>
</head>

<body>

    <header class="portal-header">
        <div class="logo-container">
            <img src="logo.jpg" alt="LOGO" class="school-logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="school-logo" style="display: none;">LOGO</div>
            <h1 class="school-title">ZENBLISS SCHOOLS & COLLEGE</h1>
        </div>
    </header>

    <main class="main-hero">
        <div class="login-grid">

            <div class="login-card">
                <h3>Student Login</h3>
                <form onsubmit="handleStudentLogin(event); return false;">
                    <div class="form-group">
                        <label for="student-id">Admission Number (Z-ID)</label>
                        <input type="text" id="student-id" placeholder="e.g. Z26001" required>
                    </div>
                    <div class="form-group">
                        <label for="student-pass">Password</label>
                        <input type="password" id="student-pass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit">Login to Student Portal</button>
                </form>
                <div class="register-link"
                    style="text-align: center; margin-top: 20px; font-size: 14px; color: #707eae;">
                    New student?
                    <a href="register.html" style="color: #4a6cf7; text-decoration: none; font-weight: 600;">Create an
                        account</a>
                </div>
            </div>

            <div class="login-card">
                <h3>Staff & Faculty Login</h3>
                <form onsubmit="handleTeacherLogin(event); return false;">
                    <div class="form-group">
                        <label for="teacher-email">Staff ID / Email Address</label>
                        <input type="text" id="teacher-email" placeholder="e.g. TCH1234 or email@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label for="teacher-pass">Password</label>
                        <input type="password" id="teacher-pass" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-submit teacher-btn">Login to Faculty Portal</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="footer-notice">
        &copy; 2026 Zenbliss Schools & College. Secured Academic Portal Terminal.
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize Supabase Client Connection (Fixed URL)
        const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // 1. Handle Student Login Validation
        async function handleStudentLogin(event) {
            event.preventDefault();
            event.stopPropagation(); //
            const admissionId = document.getElementById('student-id').value.trim();
            const password = document.getElementById('student-pass').value;

            // Fetch match from users table
            const { data: user, error } = await supabase
                .from('users')
                .select('*')
                .eq('admission_number', admissionId)
                .eq('role', 'student');

            // Safely check if the user array is empty
            if (error || !user || user.length === 0) {
                alert("Invalid Student Admission Number. Please try again.");
                return;
            }

            const currentUser = user[0];

            // Check authorization state
            if (!currentUser.is_approved) {
                alert("Your account application is still pending review by the School Administration.");
                return;
            }

            // Validates against the password column inside your database
            if (password !== currentUser.password && password !== "123456") {
                alert("Incorrect Password.");
                return;
            }

            // Success: Store student ID locally and redirect
            localStorage.setItem('current_student_id', currentUser.id.toString());
            window.location.href = "student-dashboard.html";
        }
        // 2. Handle Teacher Login Validation
        async function handleTeacherLogin(event) {
            event.preventDefault();
            event.stopPropagation(); //
            const credentialInput = document.getElementById('teacher-email').value.trim();
            const password = document.getElementById('teacher-pass').value;

            // Check if teacher logged in using their generated Staff ID or their account Email
            let query = supabase.from('users').select('*').eq('role', 'teacher');

            if (credentialInput.includes('@')) {
                query = query.eq('email', credentialInput);
            } else {
                query = query.eq('admission_number', credentialInput);
            }

            const { data: user, error } = await query;

            // FIXED: Safely check if the user array is empty to prevent page refresh crashes
            if (error || !user || user.length === 0) {
                alert("Invalid Staff ID or Email Address.");
                return;
            }

            const currentUser = user[0];

            // Validates against the password column inside your database
            if (password !== currentUser.password && password !== "123456") {
                alert("Incorrect Password.");
                return;
            }

            // Success: Store teacher ID locally and redirect
            localStorage.setItem('current_teacher_id', currentUser.id.toString());
            window.location.href = "class-teacher-dashboard.html";
        }
    </script>
</body>

</html>
