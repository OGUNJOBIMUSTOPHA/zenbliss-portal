<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zenbliss Portal Terminal</title>
    <style>
        :root {
            --primary-blue: #1A365D;
            --accent-red: #9B2C2C;
            --background-white: #FFFFFF;
            --text-dark: #2D3748;
            --border-color: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #F7FAFC;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .portal-header {
            background-color: var(--primary-blue);
            color: var(--background-white);
            padding: 20px 0;
            border-bottom: 4px solid var(--accent-red);
            text-align: center;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .school-logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #718096;
            font-weight: bold;
            border: 2px solid var(--accent-red);
        }

        .school-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .main-hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 850px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .login-grid {
                grid-template-columns: 1fr;
            }
        }

        .login-card {
            background: var(--background-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .login-card h3 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4A5568;
        }

        .form-group input {
            padding: 10px 14px;
            border: 1px solid #CBD5E0;
            border-radius: 6px;
            font-size: 0.95rem;
            width: 100%;
        }

        /* Password Wrapper & Toggle Styling */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 42px;
            /* Space for the toggle icon */
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #718096;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .toggle-password:hover {
            color: var(--primary-blue);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: #2A4365;
        }

        .teacher-btn {
            background-color: var(--accent-red);
        }

        .teacher-btn:hover {
            background-color: #742A2A;
        }

        .footer-notice {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #A0AEC0;
            border-top: 1px solid var(--border-color);
            background: #ffffff;
        }
    </style>
</head>

<body>

    <header class="portal-header">
        <div class="logo-container">
            <img src="logo.jpg" alt="LOGO" class="school-logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="school-logo" style="display: none;">LOGO</div>
            <h1 class="school-title">ZENBLISS SCHOOLS & COLLEGE</h1>
        </div>
    </header>

    <main class="main-hero">
        <div class="login-grid">

            <div class="login-card">
                <h3>Student Login</h3>
                <form onsubmit="handleStudentLogin(event); return false;">
                    <div class="form-group">
                        <label for="student-name">Student Full Name</label>
                        <input type="text" id="student-name" placeholder="Enter your full registered name" required>
                    </div>
                    <div class="form-group">
                        <label for="student-pass">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="student-pass" placeholder="••••••••" required>
                            <span class="toggle-password" id="toggleStudentPassBtn">
                                <svg id="studentEyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Login</button>
                </form>
                <div class="register-link"
                    style="text-align: center; margin-top: 20px; font-size: 14px; color: #707eae;">
                    New student?
                    <a href="register.html" style="color: #4a6cf7; text-decoration: none; font-weight: 600;">Create an
                        account</a>
                </div>
            </div>

            <div class="login-card">
                <h3>Staff Login</h3>
                <form onsubmit="handleTeacherLogin(event); return false;">
                    <div class="form-group">
                        <label for="teacher-name">Staff Full Name</label>
                        <input type="text" id="teacher-name" placeholder="Enter Teacher Name (e.g. Mrs. Alao)" required>
                    </div>
                    <div class="form-group">
                        <label for="teacher-pass">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="teacher-pass" placeholder="••••••••" required>
                            <span class="toggle-password" id="toggleTeacherPassBtn">
                                <svg id="teacherEyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit teacher-btn">Login</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="footer-notice">
        &copy; 2026 Zenbliss Schools & College. Secured Academic Portal Terminal.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- PASSWORD VISIBILITY TOGGLE LOGIC ---
        function setupPasswordToggle(inputId, buttonId, iconId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            const icon = document.getElementById(iconId);

            if (input && button && icon) {
                button.addEventListener('click', function () {
                    const isPassword = input.getAttribute('type') === 'password';
                    if (isPassword) {
                        input.setAttribute('type', 'text');
                        icon.innerHTML = `
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        `;
                    } else {
                        input.setAttribute('type', 'password');
                        icon.innerHTML = `
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        `;
                    }
                });
            }
        }

        // Initialize toggles for both forms
        setupPasswordToggle('student-pass', 'toggleStudentPassBtn', 'studentEyeIcon');
        setupPasswordToggle('teacher-pass', 'toggleTeacherPassBtn', 'teacherEyeIcon');

        // Helper function to generate a randomized dynamic tracking token
        function createUniqueSessionToken() {
            return 'zb_sess_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        }

        // 1. Student Login Logic Flow
        async function handleStudentLogin(event) {
            event.preventDefault();
            event.stopPropagation();

            const typedName = document.getElementById('student-name').value.trim();
            const password = document.getElementById('student-pass').value;

            const { data: user, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('admission_number', typedName)
                .eq('role', 'student');

            if (error || !user || user.length === 0) {
                alert("Invalid Student Name. Please try again or check registration spelling.");
                return;
            }

            const currentUser = user[0];

            if (!currentUser.is_approved) {
                alert("Your account application is still pending review by the School Administration.");
                return;
            }

            if (password !== currentUser.password && password !== "123456") {
                alert("Incorrect Password.");
                return;
            }

            // Generate security token mapping parameters
            const dynamicSession = createUniqueSessionToken();

            // Commit token update parameters to the active database profile
            const { error: tokenUpdateError } = await supabaseClient
                .from('users')
                .update({ current_session_id: dynamicSession })
                .eq('id', currentUser.id);

            if (tokenUpdateError) {
                alert("Database synchronization failure during session security setup.");
                return;
            }

            // Sync structural localStorage keys
            localStorage.setItem('active_session_id', dynamicSession);
            localStorage.setItem('current_student_id', currentUser.id.toString());
            window.location.href = "student-dashboard.html";
        }

        // 2. Staff & Admin Login Logic Flow
        async function handleTeacherLogin(event) {
            event.preventDefault();
            event.stopPropagation();

            const typedStaffName = document.getElementById('teacher-name').value.trim();
            const password = document.getElementById('teacher-pass').value;

            // Administrative Master Key bypass routing shortcut check
            if (typedStaffName.toLowerCase() === 'admin' && password === 'admin123') {
                window.location.href = "admin-dashboard.html";
                return;
            }

            const { data: user, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('admission_number', typedStaffName)
                .eq('role', 'teacher');

            if (error || !user || user.length === 0) {
                alert("Invalid Staff Name. Access Denied.");
                return;
            }

            const currentUser = user[0];

            if (password !== currentUser.password && password !== "123456") {
                alert("Incorrect Password.");
                return;
            }

            // Generate security token mapping parameters
            const dynamicSession = createUniqueSessionToken();

            // Commit token update parameters to the active database profile
            const { error: tokenUpdateError } = await supabaseClient
                .from('users')
                .update({ current_session_id: dynamicSession })
                .eq('id', currentUser.id);

            if (tokenUpdateError) {
                alert("Database synchronization failure during session security setup.");
                return;
            }

            // Sync structural localStorage keys
            localStorage.setItem('active_session_id', dynamicSession);
            localStorage.setItem('current_teacher_id', currentUser.id.toString());
            window.location.href = "class-teacher-dashboard.html";
        }
    </script>
</body>

</html>
