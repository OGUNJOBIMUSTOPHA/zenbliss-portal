<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenbliss Schools — Admin Control Portal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Private layout variant styles for the admin window */
        .admin-page-body {
            background-color: #1A202C;
            /* Dark professional theme background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-box {
            border-top: 6px solid var(--accent-red);
            width: 100%;
            max-width: 420px;
            padding: 35px;
            background: var(--background-white);
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .admin-logo-centered {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            text-align: center;
        }

        .admin-logo-centered img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        .admin-logo-centered h2 {
            color: var(--primary-blue);
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0;
        }

        /* Password Wrapper & Toggle Styling */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 42px;
            width: 100%;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #718096;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .toggle-password:hover {
            color: var(--primary-blue);
        }
    </style>
</head>

<body class="admin-page-body">

    <div class="admin-box">
        <div class="admin-logo-centered">
            <img src="logo.jpg" alt="Zenbliss Logo">
            <h2>PROPRIETRESS TERMINAL</h2>
            <small style="color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Secure
                Access Only</small>
        </div>

        <form class="portal-form" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
                <label for="admin-user">System Username</label>
                <input type="text" id="admin-user" placeholder="Enter Admin Username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="admin-pass">Master Password</label>
                <div class="password-wrapper">
                    <input type="password" id="admin-pass" placeholder="••••••••" required>
                    <span class="toggle-password" id="toggleAdminPassBtn">
                        <svg id="adminEyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-submit accent-red" style="margin-top: 15px;">Initialize Control
                Dashboard</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://msqvndhvxtfdzzuswvdz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LMoSZHZaX_VH1yjk1vOuZA_Cb-AYsBH";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Password Visibility Toggle Logic
        const adminPassInput = document.getElementById('admin-pass');
        const toggleAdminPassBtn = document.getElementById('toggleAdminPassBtn');
        const adminEyeIcon = document.getElementById('adminEyeIcon');

        if (toggleAdminPassBtn && adminPassInput && adminEyeIcon) {
            toggleAdminPassBtn.addEventListener('click', function () {
                const isPassword = adminPassInput.getAttribute('type') === 'password';
                if (isPassword) {
                    adminPassInput.setAttribute('type', 'text');
                    adminEyeIcon.innerHTML = `
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    `;
                } else {
                    adminPassInput.setAttribute('type', 'password');
                    adminEyeIcon.innerHTML = `
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    `;
                }
            });
        }

        // Helper function to generate a randomized session string
        function createUniqueSessionToken() {
            return 'zb_sess_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            event.stopPropagation();

            const usernameInput = document.getElementById('admin-user').value.trim();
            const passwordInput = document.getElementById('admin-pass').value;

            const { data: user, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('admission_number', usernameInput)
                .eq('role', 'admin');

            if (error) {
                alert("Database Error: " + error.message);
                return;
            }

            if (!user || user.length === 0) {
                alert("Access Denied: Invalid Admin Login ID.");
                return;
            }

            const currentAdmin = user[0];

            if (passwordInput !== currentAdmin.password) {
                alert("Access Denied: Incorrect Password.");
                return;
            }

            // Generate security token mapping parameters
            const dynamicSession = createUniqueSessionToken();

            // Commit token update parameters to the active database profile
            const { error: tokenUpdateError } = await supabaseClient
                .from('users')
                .update({ current_session_id: dynamicSession })
                .eq('id', currentAdmin.id);

            if (tokenUpdateError) {
                alert("Database synchronization failure during session security setup.");
                return;
            }

            // Sync structural localStorage keys
            localStorage.setItem('active_session_id', dynamicSession);
            localStorage.setItem('current_admin_id', currentAdmin.id.toString());

            window.location.href = "admin-dashboard.html";
        }
    </script>
</body>

</html>
